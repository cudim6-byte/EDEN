        let activePool = [...fullQuestionBank];
        let currentQuestion = null;
        let pointsScore = 0;

        function loadQuestion() {
            if (activePool.length === 0) {
                showCompletionScreen();
                return;
            }

            const feedbackBox = document.getElementById('feedback-box');
            const nextButton = document.getElementById('next-button');
            const optionsBox = document.getElementById('options-box');

            feedbackBox.className = "feedback";
            feedbackBox.style.display = "none";
            nextButton.style.display = "none";
            optionsBox.innerHTML = "";

            document.getElementById('count').innerText = activePool.length;

            const randomIndex = Math.floor(Math.random() * activePool.length);
            currentQuestion = activePool[randomIndex];

            document.getElementById('question-text').innerText = currentQuestion.q;

            currentQuestion.a.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = "option-btn";
                button.innerText = option;
                button.onclick = () => checkAnswer(index, button);
                optionsBox.appendChild(button);
            });
        }

        function checkAnswer(selectedIndex, clickedButton) {
            const feedbackBox = document.getElementById('feedback-box');
            const nextButton = document.getElementById('next-button');
            const optionsBox = document.getElementById('options-box');

            const buttons = optionsBox.getElementsByClassName('option-btn');
            for (let btn of buttons) {
                btn.disabled = true;
            }

            if (selectedIndex === currentQuestion.correct) {
                clickedButton.style.borderColor = "#28a745";
                clickedButton.style.backgroundColor = "#e8f5e9";
                feedbackBox.innerText = "good job";
                feedbackBox.className = "feedback correct";
                nextButton.style.display = "block";

                // 1 question = 1 point
                pointsScore += 1;
                document.getElementById('score').innerText = pointsScore;
            } else {
                clickedButton.style.borderColor = "#dc3545";
                clickedButton.style.backgroundColor = "#fdf2f2";
                feedbackBox.innerText = "try again";
                feedbackBox.className = "feedback wrong";

                // -1 point for a wrong answer
                pointsScore -= 1;
                document.getElementById('score').innerText = pointsScore;

                setTimeout(() => {
                    loadQuestion();
                }, 1500);
            }
        }

        function handleNext() {
            activePool = activePool.filter(item => item.q !== currentQuestion.q);
            loadQuestion();
        }

        function showCompletionScreen() {
            const container = document.getElementById('quiz-window');
            container.innerHTML = `
        <div class="completion-screen">
            <h1>🎉 Quiz Completed!</h1>
            <p>You went through all 75 questions.</p>
            <h2>Final Score: <span style="color:#2b7a78">${pointsScore}</span> points</h2>
            <button class="restart-btn" onclick="restartQuiz()">Play Again</button>
        </div>
    `;
        }

        function restartQuiz() {
            location.reload();
        }

        loadQuestion();
    </script>
