    let currentQuestion = {};

    function loadRandomQuestion() {
        // Reset states
        const feedbackBox = document.getElementById("feedback-box");
        const nextButton = document.getElementById("next-button");
        feedbackBox.className = "feedback";
        feedbackBox.style.display = "none";
        nextButton.style.display = "none";

        // Pick a random entry
        const randomIndex = Math.floor(Math.random() * quizData.length);
        currentQuestion = quizData[randomIndex];

        // Print question text
        document.getElementById("question-text").innerText = currentQuestion.q;

        // Render shuffled or indexed option buttons
        const optionsBox = document.getElementById("options-box");
        optionsBox.innerHTML = "";
        
        currentQuestion.a.forEach(option => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = option;
            btn.onclick = () => checkAnswer(option, btn);
            optionsBox.appendChild(btn);
        });
    }

    function checkAnswer(selectedOption, clickedButton) {
        const feedbackBox = document.getElementById("feedback-box");
        const nextButton = document.getElementById("next-button");
        const allButtons = document.querySelectorAll(".option-btn");

        // Lock button presses
        allButtons.forEach(btn => btn.disabled = true);

        if (selectedOption === currentQuestion.correct) {
            feedbackBox.innerText = "Good!";
            feedbackBox.className = "feedback good";
            clickedButton.style.backgroundColor = "#c3e6cb";
            clickedButton.style.borderColor = "#28a745";
        } else {
            feedbackBox.innerText = `Try again. The true answer is: "${currentQuestion.correct}"`;
            feedbackBox.className = "feedback wrong";
            clickedButton.style.backgroundColor = "#f5c6cb";
            clickedButton.style.borderColor = "#dc3545";
            
            // Highlight true answer passively
            allButtons.forEach(btn => {
                if (btn.innerText === currentQuestion.correct) {
                    btn.style.backgroundColor = "#c3e6cb";
                    btn.style.borderColor = "#28a745";
                }
            });
        }
        nextButton.style.display = "block";
    }

    // Initialize first load
    window.onload = loadRandomQuestion;
</script>
